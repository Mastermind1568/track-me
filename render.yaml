services:
  # --- Backend API Service ---
  - type: web
    name: quickship-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 app.main:app --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quickship-db
          property: connectionString
      - key: ADMIN_SECRET_KEY
        generateValue: true
      - key: SQL_ECHO
        value: "false"
      - key: CORS_ORIGINS
        value: "*" # We will restrict this to your specific Vercel URLs after they are generated

databases:
  - name: quickship-db
    plan: free # This uses the Render free tier
